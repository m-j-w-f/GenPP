[project]
authors = [{name = "Moritz Feik", email = "uxlha@student.kit.edu"}]
name = "genpp"
requires-python = ">= 3.13"
version = "0.1.0"

[build-system]
build-backend = "hatchling.build"
requires = ["hatchling"]

[tool.pixi.workspace]
channels = ["conda-forge"]
platforms = ["osx-arm64", "linux-64"]

[tool.pixi.system-requirements]
cuda = "12.2"

[tool.pixi.pypi-dependencies]
genpp = { path = ".", editable = true }
flow_matching = ">=1.0.10,<2"

[tool.pixi.tasks]
install-kernel = "python -m ipykernel install --user --name=pixi-env --display-name=GENPP"
train = "python src/genpp/train.py" # Specify file by using --config-name ...

[tool.pixi.dependencies]
zarr = ">=3.0.10,<4"
gcsfs = ">=2025.5.1,<2026"
dask = ">=2025.7.0,<2026"
xarray = ">=2025.7.1,<2026"
netcdf4 = ">=1.7.2,<2"
matplotlib = ">=3.10.3,<4"
pytorch = ">=2.7.1,<3"
einops = ">=0.8.1,<0.9"
lightning = ">=2.5.2,<3"
xbatcher = ">=0.4.0,<0.5"
scipy = ">=1.7.2,<2"
hydra-core = ">=1.3.2,<2"
omegaconf = ">=2.3.0,<3"
wandb = ">=0.21.0,<0.22"

[tool.pixi.feature.dev.dependencies]
pytest = ">=8.4.1,<9"
scoringrules = ">=0.8.0,<0.9"
pre-commit = ">=4.2.0,<5"
ipykernel = ">=6.29.5,<7"
rsync = ">=3.4.1,<4"


[tool.pixi.feature.dev.tasks]
test = "pytest"
sync = "rsync -avzr --progress --human-readable --exclude='.pixi/' --exclude='__pycache__/' --exclude='.DS_Store' . $RSYNC_USER@econ-stat-RR02.econ.kit.edu:/home/$RSYNC_USER/GenPP/"
create_sweep = "wandb sweep --project genpp" # Followed by path to sweep.yaml


[tool.pixi.environments]
dev = ["default","dev"]
