program: src/genpp/train.py
name: Engression_WB2_n_samples_train_experiment
description: >
  Experiment to compare Engression model performance on WB2 dataset
  when training with different n_samples_train values (lower than n_samples_predict).
  n_samples_predict is fixed at 50 while n_samples_train varies.
metric:
  name: val_loss
  goal: minimize
method: grid

parameters:
  +model.n_samples_train:
    values: [2, 5, 10, 20, 50]

command:
  - pixi
  - run
  - -e
  - gpu
  - python
  - ${program}
  - --config-name
  - base_engression
  - model=cnn_engression_direct
  - model/lr_scheduler=reduceLROnPlateau
  - data=wb2_full_pad_x
  - +model.n_samples_predict=50
  - model/loss_fn=energy_score
  - ${args_no_hyphens}
