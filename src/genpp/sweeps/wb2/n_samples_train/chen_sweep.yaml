program: src/genpp/train.py
name: Chen_WB2_n_samples_train_experiment_2
project: genpp
description: >
  Experiment to compare Chen model performance on WB2 dataset
  when training with different n_samples_train values (lower than n_samples_predict).
  n_samples_predict is fixed at 50 while n_samples_train varies.
metric:
  name: val_loss
  goal: minimize
method: grid

parameters:
  +model.n_samples_train:
    values: [2, 4, 8, 10, 20, 30, 40, 50, 60, 70]

command:
  - pixi
  - run
  - -e
  - gpu
  - python
  - ${program}
  - --config-name
  - base_chen
  - model=cnn_chen_noise
  - data.batch_size=8
  - model.internal_td_scaling=abs
  - model.optimizer.lr=0.001
  - model.std_unet_channels=[32, 64, 128]
  - model.decoder_unet_channels=[16, 32]
  - model/loss_fn=patchwise_energy_score
  - data=wb2_full_pad_x
  - model/lr_scheduler=reduceLROnPlateau
  - +model.n_samples_predict=50
  - logger.tags=["lngm", "final", "indirect", "pes", "wb2", "extra", "n_samples_experiment"]
  - ${args_no_hyphens}
