program: src/genpp/train.py
name: testsweep_chen2
description: Sweep for Chen et al. model with multiple lead times and learned scalings
metric:
  name: val_loss
  goal: minimize
method: grid

parameters:
  model.optimizer.lr:
    values: [!!float 1e-3, !!float  1e-4]
  data.batch_size:
    values: [8, 64, 128]
  model.internal_td_scaling:
    values: ['abs', 'std']

command:
  - pixi
  - run
  - -e
  - dev-gpu
  - python
  - ${program}
  - --config-name
  - base_chen
  - ${args_no_hyphens}
