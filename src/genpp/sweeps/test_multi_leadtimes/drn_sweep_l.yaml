program: src/genpp/train.py
name: testsweep_drn_l
metric:
  name: val_loss
  goal: minimize
method: grid

parameters:
  model.optimizer.lr:
    values: [!!float 1e-3, !!float  3e-4, !!float  1e-4]
  data.batch_size:
    values: [8, 16, 32]
  model.hidden_channels:
    values: [[256, 128, 64], [128, 64], [64]]


command:
  - pixi
  - run
  - -e
  - default
  - python
  - ${program}
  - --config-name
  - base_drn
  - ${args_no_hyphens}
