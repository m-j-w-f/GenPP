program: src/genpp/train.py
name: testsweep_chen_spatial
metric:
  name: val_loss
  goal: minimize
method: grid

parameters:
  model.optimizer.lr:
    values: [!!float 1e-3, !!float  1e-4]
  data.batch_size:
    values: [8, 32]
  model.loss_fn.patch_size:
    values: [3, 5, 7]
  model.decoder_unet_channels:
    values:
      - [16, 32]
      - [32, 64, 128]
      - [64, 128]
  model.std_unet_channels:
    values:
      - [16, 32]
      - [32, 64, 128]
      - [64, 128]

command:
  - pixi
  - run
  - -e
  - dev-gpu
  - python
  - ${program}
  - --config-name
  - base_chen_spatial
  - ${args_no_hyphens}
