program: src/genpp/train.py
name: testsweep_chen
metric:
  name: val_loss
  goal: minimize
method: grid

parameters:
  model.optimizer.lr:
    values: [!!float 1e-3, !!float  1e-4, !!float  1e-5]
  data.batch_size:
    values: [8, 64, 128]

command:
  - pixi
  - run
  - -e
  - default
  - python
  - ${program}
  - --config-name base_chen
  - ${args_no_hyphens}
