program: src/genpp/train.py
name: FM_UVIT_ICON_indirect
metric:
  name: val_loss
  goal: minimize
method: grid

parameters:
  model.optimizer.lr:
    values: [!!float 1e-3, !!float  3e-4]
  data.batch_size:
    values: [8, 32]
  model.backbone.embed_dim:
    values: [32, 64, 128]
  model.backbone.depth:
    values: [1, 2]

command:
  - pixi
  - run
  - -e
  - gpu
  - python
  - ${program}
  - --config-name
  - base_fm_uvit
  - model=fm_uvit_noise
  - model.internal_td_scaling=std
  - model/lr_scheduler=reduceLROnPlateau
  - data=icon_full_pad_xy
  - data.dataloader.num_workers=10
  - ${args_no_hyphens}
