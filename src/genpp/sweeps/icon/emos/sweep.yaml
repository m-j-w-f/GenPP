program: src/genpp/train.py
name: emos_icon
description: Sweep for EMOS on the icon dataset
metric:
  name: val_loss
  goal: minimize
method: grid

parameters:
  model.optimizer.lr:
    values: [!!float 1e-3, !!float  3e-4, !!float  1e-4]
  data.batch_size:
    values: [8, 64, 128]

command:
  - pixi
  - run
  - -e
  - gpu
  - python
  - ${program}
  - --config-name
  - base_emos
  - data=icon_cut
  - model/lr_scheduler=reduceLROnPlateau
  - ${args_no_hyphens}
