program: src/genpp/train.py
name: LNGM_ICON_direct_multiscale_energy_score
metric:
  name: val_loss
  goal: minimize
method: grid

parameters:
  model.optimizer.lr:
    values: [!!float 1e-3]
  model.decoder_unet_channels:
    values:
      - [16, 32, 64]
      - [16, 32]
      - [16, 16, 16]
  model.std_unet_channels:
    values:
      - [32, 64, 64]
      - [16, 32]
      - [16, 16, 16]

command:
  - pixi
  - run
  - -e
  - gpu
  - python
  - ${program}
  - --config-name
  - base_chen
  - model=cnn_chen_direct
  - data=icon_full_pad_x
  - data.dataloader.num_workers=10
  - +model.n_samples_train=20
  - +model.n_samples_predict=40
  - data.train_batch_size=8
  - data.val_batch_size=8
  - data.test_batch_size=8
  - trainer.accumulate_grad_batches=1
  - model/loss_fn=multiscale_energy_score
  - ${args_no_hyphens}
