scheduler:
  _target_: torch.optim.lr_scheduler.ChainedScheduler
  _partial_: true
  schedulers:
    # Phase 1: Linear Warmup
    - _target_: torch.optim.lr_scheduler.LinearLR
      _partial_: true
      start_factor: 1e-6  # Start very small for high loss scenarios
      end_factor: 1.0
      total_iters: 5460   # 20% of total steps (273 * 100 * 0.2)

    # Phase 2: Cosine Annealing
    - _target_: torch.optim.lr_scheduler.CosineAnnealingLR
      _partial_: true
      T_max: 21840        # Remaining 80% of steps (273 * 100 * 0.8)
      eta_min: 1e-7       # Very small minimum LR for high loss scenarios

interval: "step"
frequency: 1
