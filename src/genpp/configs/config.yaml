# Main configuration file for GenPP training
defaults:
  - data/dataloader: standard
  - data/spatial: standard
  - data/splits: standard
  - data/variables: full
  - data/preprocess: standard
  - data: weatherbench2
  - model: cnn_chen
  - trainer: default
  - logger: default
  - _self_

seed: 42

# Hydra configuration
hydra:
  job:
    chdir: true
  run:
    dir: outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}

# Custom Test stuff
trainer:
  overfit_batches: 1
  precision: 16-mixed  # Use mixed precision training
  accelerator: cpu
