# Standard spatial configuration for WeatherBench2
# Original data dimensions
original:
  latitude: 31
  longitude: 37

# Padding applied (top, bottom, left, right)
padding:
  lat_left: 0
  lat_right: 1
  lon_top: 5
  lon_bottom: 6

padding_list:
  - ${..padding.lat_left}
  - ${..padding.lat_right}
  - ${..padding.lon_top}
  - ${..padding.lon_bottom}

# Padded dimensions after padding (calculated dynamically)
padded:
  latitude: ${eval:'${..original.latitude} + ${..padding.lat_left} + ${..padding.lat_right}'}
  longitude: ${eval:'${..original.longitude} + ${..padding.lon_top} + ${..padding.lon_bottom}'}

x_transform:
  _target_: genpp.preproc.transforms.Pad
  padding: ${data.spatial.padding_list}
  mode: "constant"

y_transform: null
