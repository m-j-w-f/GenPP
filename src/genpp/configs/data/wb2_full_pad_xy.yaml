# WeatherBench2 Full DataModule Configuration - Padded X and Y spatial transform
# Flattened config with padding applied to both X and Y

defaults:
  - wb2_full

# ============================================================================
# SPATIAL CONFIGURATION (Override with padding for X and Y)
# ============================================================================
spatial:
  original:
    latitude: 31
    longitude: 37

  padding:
    lat_left: 0
    lat_right: 1
    lon_top: 1
    lon_bottom: 2

  padding_list:
    - ${data.spatial.padding.lat_left}
    - ${data.spatial.padding.lat_right}
    - ${data.spatial.padding.lon_top}
    - ${data.spatial.padding.lon_bottom}

  padded:
    latitude: ${eval:'${data.spatial.original.latitude} + ${data.spatial.padding.lat_left} + ${data.spatial.padding.lat_right}'}
    longitude: ${eval:'${data.spatial.original.longitude} + ${data.spatial.padding.lon_top} + ${data.spatial.padding.lon_bottom}'}

  x_transform:
    _target_: genpp.preproc.transforms.Pad
    padding: ${data.spatial.padding_list}
    mode: "constant"

  y_transform:
    _target_: genpp.preproc.transforms.Pad
    padding: ${data.spatial.padding_list}
    mode: "constant"
