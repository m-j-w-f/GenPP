# WeatherBench2 DataModule Configuration with Hydra composition - Full dataset
x_select_variables:
  - '10m_u_component_of_wind'
  - '10m_v_component_of_wind'
  - '10m_wind_speed'
  - '2m_temperature'
  - 'geopotential_lev500'
  - 'geopotential_lev700'
  - 'geopotential_lev850'
  - 'mean_sea_level_pressure'
  - 'relative_humidity_lev500'
  - 'relative_humidity_lev700'
  - 'relative_humidity_lev850'
  - 'specific_humidity_lev500'
  - 'specific_humidity_lev700'
  - 'specific_humidity_lev850'
  - 'temperature_lev500'
  - 'temperature_lev700'
  - 'temperature_lev850'
  - 'total_precipitation'
  - 'total_precipitation_24hr'
  - 'total_precipitation_6hr'
  - 'u_component_of_wind_lev500'
  - 'u_component_of_wind_lev700'
  - 'u_component_of_wind_lev850'
  - 'v_component_of_wind_lev500'
  - 'v_component_of_wind_lev700'
  - 'v_component_of_wind_lev850'
  - 'wind_speed_lev500'
  - 'wind_speed_lev700'
  - 'wind_speed_lev850'
y_select_variables: # TODO check the order
  - '2m_temperature'
  - '10m_wind_speed'

# Feature configuration for full dataset
features:
  input_features: ${eval:'len(${data.x_select_variables})'}
  aggregation_levels: 2
  meta_features: 4  # The pixel index is excluded here
  output: ${eval:'len(${data.y_select_variables})'}
  input_concat: ${eval:'${data.features.input_features} * ${data.features.aggregation_levels} + ${data.features.meta_features} + (${model.embedding_dim} > 0)'}

# Shared configuration parameters
batch_size: 8

# Template for dataset split configuration
_split_template: &split_template
  x_kwargs:
    input_dims:
      feature: ${data.features.input_concat}
      longitude: ${data.spatial.original.longitude}
      latitude: ${data.spatial.original.latitude}
    batch_dims:
      prediction_time: ${data.batch_size}
  x_transform: ${data.spatial.x_transform}
  y_kwargs:
    input_dims:
      feature: ${data.features.output}
      longitude: ${data.spatial.original.longitude}
      latitude: ${data.spatial.original.latitude}
    batch_dims:
      time: ${data.batch_size}
  y_transform: ${data.spatial.y_transform}
  preload_batch: true

_dataloader_template: &dataloader_template
  batch_size: ${data.dataloader.batch_size}
  prefetch_factor: ${data.dataloader.prefetch_factor}
  num_workers: ${data.dataloader.num_workers}
  multiprocessing_context: ${data.dataloader.multiprocessing_context}
  pin_memory: ${data.dataloader.pin_memory}

module:
  _target_: genpp.data.dataset.WeatherBench2DataModule
  # Dataset configuration using templates and interpolation
  dataset_config:
    train:
      <<: *split_template
      slice: ${data.splits.train}

    val:
      <<: *split_template
      slice: ${data.splits.val}

    test:
      <<: *split_template
      slice: ${data.splits.test}

  # DataLoader configuration using composition
  dataloader_config:
    train:
      <<: *dataloader_template
      shuffle: true

    val:
      <<: *dataloader_template
      shuffle: false

    test:
      <<: *dataloader_template
      shuffle: false
  x_preprocessing: ${data.preprocess.x_preprocessing}
  y_preprocessing: ${data.preprocess.y_preprocessing}
  x_select_variables: ${data.x_select_variables}
  y_select_variables: ${data.y_select_variables}
