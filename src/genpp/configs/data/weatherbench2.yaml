# WeatherBench2 DataModule Configuration with Hydra composition
defaults:
  - dataloader: standard
  - spatial: standard
  - splits: standard
  - variables: full
  - /preprocess: standard
  - _self_


# Shared configuration parameters
batch_size: 8

# Template for dataset split configuration
_split_template: &split_template
  x_kwargs:
    input_dims:
      variable: ${data.variables.input_concat}
      latitude: ${data.spatial.original.latitude}
      longitude: ${data.spatial.original.longitude}
    batch_dims:
      prediction_time: ${data.batch_size}
    x_transform:
      _target_: genpp.preproc.transforms.Pad
      padding: ${data.spatial.padding_list}
      mode: "constant"
  y_kwargs:
    input_dims:
      variable: ${data.variables.output}
      latitude: ${data.spatial.original.latitude}
      longitude: ${data.spatial.original.longitude}
    batch_dims:
      time: ${data.batch_size}
    y_transform: null

_dataloader_template: &dataloader_template
  batch_size: ${data.dataloader.batch_size}
  prefetch_factor: ${data.dataloader.prefetch_factor}
  num_workers: ${data.dataloader.num_workers}
  multiprocessing_context: ${data.dataloader.multiprocessing_context}
  pin_memory: ${data.dataloader.pin_memory}

module:
  _target_: genpp.data.dataset.WeatherBench2DataModule
  # Dataset configuration using templates and interpolation
  dataset_config:
    train:
      <<: *split_template
      slice: ${data.splits.train}

    val:
      <<: *split_template
      slice: ${data.splits.val}

    test:
      <<: *split_template
      slice: ${data.splits.test}

  # DataLoader configuration using composition
  dataloader_config:
    train:
      <<: *dataloader_template
      shuffle: true

    val:
      <<: *dataloader_template
      shuffle: false

    test:
      <<: *dataloader_template
      shuffle: false
  x_preprocessing: ${data.preprocess.x_preprocessing}
  y_preprocessing: ${data.preprocess.y_preprocessing}
