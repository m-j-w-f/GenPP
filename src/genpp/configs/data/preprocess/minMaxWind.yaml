# Standard preprocessing pipeline for WeatherBench2
x_preprocessing:
  - _target_: genpp.preproc.preprocessors.AddMetadataPreprocessor
    meta_features:
      - ${enum:genpp.data.weatherbench2.MetadataVars.LATITUDE}
      - ${enum:genpp.data.weatherbench2.MetadataVars.LONGITUDE}
  - _target_: genpp.preproc.preprocessors.StandardScalerPreprocessor
    dim: ["time", "prediction_timedelta", "latitude", "longitude"]
  - _target_: genpp.preproc.preprocessors.AddMetadataPreprocessor
    meta_features:
      - ${enum:genpp.data.weatherbench2.MetadataVars.SIN_PREDICTION_TIME}
      - ${enum:genpp.data.weatherbench2.MetadataVars.COS_PREDICTION_TIME}
      - ${enum:genpp.data.weatherbench2.MetadataVars.PIXEL_IDX}

y_preprocessing:
  - _target_: genpp.preproc.preprocessors.StandardScalerPreprocessor
    dim: ["time", "latitude", "longitude"]
    features: ["2m_temperature"]
    fit_only: true
  - _target_: genpp.preproc.preprocessors.MinMaxScalerPreprocessor
    dim: ["time", "latitude", "longitude"]
    features: ["10m_wind_speed"]
    fit_only: true
