# WeatherBench2 Cut DataModule Configuration for the EMOS Model
# Inherits from weatherbench2_full_fast.yaml and overrides specific variables
# - no embedding
# - only 2 input vars

defaults:
  - weatherbench2_full_fast

# Override with reduced variable set
x_select_variables:
  - '2m_temperature'
  - '10m_wind_speed'

# Reduce batch size for smaller dataset
batch_size: 8
