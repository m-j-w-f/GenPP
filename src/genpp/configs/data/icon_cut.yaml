# ICON Cut DataModule Configuration - Reduced variables for EMOS Model
# Minimal preprocessing with only 2 input variables

defaults:
  - icon_full

# Override with reduced variable set (minimal for EMOS)
x_select_variables:
  - 'T_2M+height_2.0'
  - 'VMAX_10M+height_2_10.0'

y_select_variables:
  - 'T_2M+height_2.0'
  - 'VMAX_10M+height_2_10.0'

# Reduce batch size for smaller dataset
batch_size: 8

# ============================================================================
# NO PREPROCESSING (for EMOS - flat spatial structure)
# ============================================================================
# EMOS works with flattened spatial dimensions, no transforms needed
spatial:
  x_transform: null
  y_transform: null

# Use default normalization (zscore for both x and y)
x_default_normalize_type: zscore
y_default_normalize_type: zscore
x_normalize_types: null
y_normalize_types: null
