# Standard preprocessing pipeline for WeatherBench2
x_preprocessing:
  - _target_: genpp.preproc.preprocessors.AddMetadataPreprocessor
    meta_features:
      - genpp.data.MetadataVars.LATITUDE
      - genpp.data.MetadataVars.LONGITUDE
  - _target_: genpp.preproc.preprocessors.StandardScalerPreprocessor
    dim: ["prediction_time", "latitude", "longitude"]
  - _target_: genpp.preproc.preprocessors.AddMetadataPreprocessor
    meta_features:
      - genpp.data.MetadataVars.SIN_PREDICTION_TIME
      - genpp.data.MetadataVars.COS_PREDICTION_TIME
      - genpp.data.MetadataVars.PIXEL_IDX

y_preprocessing:
  - _target_: genpp.preproc.preprocessors.StandardScalerPreprocessor
    dim: ["prediction_time", "latitude", "longitude"]
