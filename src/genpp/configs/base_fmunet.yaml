# Main configuration file for GenPP training
defaults:
  - data/dataloader: standard
  - data/spatial: padded_xy
  - data/splits: standard
  - data/preprocess: standard
  - data: weatherbench2_full
  - model/optimizer: adamW
  - model/lr_scheduler: constant
  - model: fm_cnn
  - trainer: default
  - logger: wandb
  - _self_

seed: 42

# Hydra configuration
hydra:
  job:
    chdir: true
  run:
    dir: outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}

# Custom Test stuff
trainer:
  accelerator: gpu
  devices: 1
  max_epochs: 1000


logger:
  tags:
    - "test"
    - "unet"
    - "fm"
