# Main configuration file for GenPP training with Engression
defaults:
  - data/dataloader: standard
  - data/spatial: padded_x
  - data/splits: standard
  - data/preprocess: standard
  - data: weatherbench2_full_fast
  - model/optimizer: adamW
  - model/lr_scheduler: constant
  - model/loss_fn: energy_score
  - model: engression
  - trainer: default
  - logger: wandb
  - hydra: standard
  - _self_

name: ENGRESSION
seed: 42

# Override default batch size for engression model to avoid OOM
data:
  batch_size: 8

logger:
  tags:
    - "engression"
    - "cnn"
    - "multi leadtime"
