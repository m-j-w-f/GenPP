# Main configuration file for GenPP training
defaults:
  - data/dataloader: standard
  - data/spatial: standard
  - data/splits: standard
  - data/preprocess: none
  - data: weatherbench2_cut_fast
  - model/optimizer: adamW
  - model/lr_scheduler: constant
  - model: emos
  - trainer: default
  - logger: wandb
  - hydra: standard
  - _self_

name: EMOS
seed: 42

logger:
  tags:
    - ${hydra:runtime.choices.data}
    - ${hydra:runtime.choices.model}
